<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>EventWOS</title>

    <!-- ─── PWA / installability ─────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <!-- iOS home-screen support (Safari doesn't read all of manifest.json) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EventWOS" />

    <!-- Android/Chrome app-shell hints -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="EventWOS" />
    <base href="/" />
    <!-- Tailwind CDN (swap for compiled build in production) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: #818cf8; }

        /* Blazor loading screen */
        #blazor-error-ui {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            bottom: 16px;
            right: 16px;
            left: 16px;
            display: none;
            overflow: hidden;
            padding: 12px 16px;
            position: fixed;
            z-index: 1000;
            max-width: 480px;
            margin: auto;
        }
        #blazor-error-ui .dismiss { float: right; cursor: pointer; font-weight: 700; }

        /* iOS notch — reserve safe area on standalone launches. Only
           applies inside the standalone display mode (i.e. after Add to
           Home Screen), so browser tabs are unaffected. */
        @media all and (display-mode: standalone) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
                padding-bottom: env(safe-area-inset-bottom);
                background: #0f172a; /* prevents white flash under the notch */
            }
        }

        /* "New version available" reload toast */
        #pwa-update-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: #fff; padding: 12px 20px; border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25); display: none;
            font-family: system-ui, -apple-system, sans-serif; font-size: 14px;
            align-items: center; gap: 12px; z-index: 9999;
        }
        #pwa-update-toast button {
            background: #6366f1; color: #fff; border: 0; border-radius: 8px;
            padding: 6px 14px; font-weight: 600; cursor: pointer;
        }
        #pwa-update-toast button:hover { background: #4f46e5; }
    </style>
</head>
<body class="antialiased text-gray-900">
    <div id="app">
        <!-- Loading screen -->
        <div style="display:flex;height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#0f172a;">
            <div style="font-size:48px;">⚡</div>
            <p style="color:#a5b4fc;font-size:14px;font-family:system-ui,sans-serif;font-weight:600;letter-spacing:0.05em;">
                LOADING EVENTWOS…
            </p>
            <div style="width:200px;height:3px;background:#1e293b;border-radius:99px;overflow:hidden;">
                <div style="width:60%;height:100%;background:linear-gradient(90deg,#6366f1,#a855f7);border-radius:99px;animation:load 1.5s ease-in-out infinite;">
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        ⚠️ An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- ═══ Stale-cache auto-recovery ══════════════════════════════════════
         When Railway deploys a new build, browsers that cached the old
         blazor.boot.json will download the new .wasm bytes and compute
         a hash that doesn't match the old manifest's SRI value. Blazor
         throws:
           "Failed to find a valid digest in the 'integrity' attribute..."
         and the whole app halts on the "An unhandled error" banner.

         Nginx now serves blazor.boot.json with no-cache, so the FIRST
         visit after deploy sees the new manifest. But for users who
         still have the old boot.json in their browser cache from a
         previous visit (or whose ISP caches it), we self-heal:

           1. Listen for the SRI / fetch failure that Blazor raises.
           2. Auto-reload with a cache-bust query string, exactly ONCE
              per session (sessionStorage guard) so we can't loop.

         The one-shot flag lives in sessionStorage — cleared on tab
         close, so a genuinely broken deploy still surfaces the error
         instead of looping the user forever.
    -->
    <script>
        (function () {
            const KEY = "eventwos-sri-recover";
            const isSriOr504 = function (msg) {
                if (!msg) return false;
                const m = String(msg);
                return m.includes("integrity") ||
                       m.includes("SRI's integrity") ||
                       m.includes("Failed to find a valid digest") ||
                       m.includes("504") ||
                       (m.includes("Failed to fetch") && m.includes("_framework/"));
            };
            const bustAndReload = async function () {
                if (sessionStorage.getItem(KEY) === "1") return; // already tried
                sessionStorage.setItem(KEY, "1");

                // NUCLEAR RESET — required for stale-SW recovery.
                //
                // A cache-busting query alone doesn't help if the
                // service worker is intercepting fetches: the SW's
                // cache-first for /_framework/blazor.boot.json returns
                // the old manifest regardless of the URL param.
                //
                // So on the recovery path we:
                //   1. Unregister every service worker on this origin.
                //   2. Delete every Cache Storage cache the SW owned.
                // Only THEN reload. On next boot the browser goes
                // straight to network for boot.json and picks up the
                // new deploy's fingerprints. One extra reload cost,
                // paid once per stuck user — worth it.
                try {
                    if ("serviceWorker" in navigator) {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        await Promise.all(regs.map(r => r.unregister()));
                    }
                    if (typeof caches !== "undefined") {
                        const keys = await caches.keys();
                        await Promise.all(keys.map(k => caches.delete(k)));
                    }
                } catch (e) {
                    // Recovery is best-effort — even if unregister/
                    // deletion partially fails, the cache-bust reload
                    // still gives us a chance to escape.
                    console.warn("[recover] cache/SW cleanup failed:", e);
                }

                const url = new URL(window.location.href);
                url.searchParams.set("_cb", Date.now().toString());
                window.location.replace(url.toString());
            };
            window.addEventListener("error", function (e) {
                if (isSriOr504(e && (e.message || (e.error && e.error.message)))) {
                    bustAndReload();
                }
            }, true);
            window.addEventListener("unhandledrejection", function (e) {
                const msg = e && e.reason && (e.reason.message || e.reason.toString());
                if (isSriOr504(msg)) bustAndReload();
            });
            // Clear the flag once Blazor has successfully started — from
            // that point on, any *later* SRI failure is a real problem,
            // not a stale-cache one, and the user should see the banner.
            window.addEventListener("load", function () {
                setTimeout(function () {
                    // Blazor's "started" signal is the appearance of any
                    // rendered content in <div id="app">. Simple check.
                    const app = document.getElementById("app");
                    if (app && app.children.length > 0 && !app.querySelector(".loader")) {
                        sessionStorage.removeItem(KEY);
                    }
                }, 8000); // give WASM time to boot on slow devices
            });
        })();
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
    <!-- QR-verified check-in helpers (renderQr / startScanner / stopScanner).
         Their heavy deps are lazy-loaded from a CDN inside the module. -->
    <script src="js/checkin.js"></script>
    <!-- Phase D step 22: helper for Excel downloads from Attendance page.
         Builds a Blob from a base64 string and triggers an anchor click.
         Defined globally so any page can call it via JSInterop. -->
    <script>
        window.downloadFileFromBytes = function (filename, mime, b64) {
            const bytes = atob(b64);
            const arr   = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
            const blob  = new Blob([arr], { type: mime });
            const url   = URL.createObjectURL(blob);
            const a     = document.createElement("a");
            a.href      = url;
            a.download  = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };
    </script>

    <style>
        @keyframes load {
            0%   { transform: translateX(-100%); }
            50%  { transform: translateX(60%); }
            100% { transform: translateX(200%); }
        }
    </style>
    <!-- PWA update-available toast -->
    <div id="pwa-update-toast">
        <span>New version available.</span>
        <button id="pwa-update-reload">Reload</button>
    </div>

    <!-- ─── Service worker registration ─────────────────────────────────
         Runs after Blazor boots — no rush, and we want the first paint
         to be fast. Handles two flows:
           1. First visit: install SW, take control on next navigation.
           2. Return visit after deploy: fetch new sw.js, detect the
              "waiting" state, show the reload toast. User taps → we
              post SKIP_WAITING and reload once the new SW is active.
    ─────────────────────────────────────────────────────────────────── -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", async () => {
                try {
                    // updateViaCache:"none" tells the browser to bypass the
                    // HTTP cache when fetching sw.js itself. Without it, some
                    // browsers cache sw.js for up to 24h regardless of the
                    // server's Cache-Control header (Chromium's historical
                    // default). We already send no-cache from nginx, but this
                    // makes the client behaviour explicit and belt-and-braces.
                    const reg = await navigator.serviceWorker.register("/sw.js", {
                        scope: "/",
                        updateViaCache: "none",
                    });

                    // Force an update-check on every page load. Cheap
                    // (single HEAD-ish request under normal SW rules) and
                    // guarantees that a fresh deploy is picked up the very
                    // next time the user opens the app — no 24h wait.
                    try { await reg.update(); } catch { /* ignore */ }

                    // A new worker was found — track it.
                    reg.addEventListener("updatefound", () => {
                        const newSw = reg.installing;
                        if (!newSw) return;
                        newSw.addEventListener("statechange", () => {
                            // "installed" while there's an existing controller = update ready.
                            if (newSw.state === "installed" && navigator.serviceWorker.controller) {
                                showUpdateToast(newSw);
                            }
                        });
                    });

                    // Reload the tab as soon as the new worker takes control,
                    // so the user sees the new version without a second refresh.
                    let refreshing = false;
                    navigator.serviceWorker.addEventListener("controllerchange", () => {
                        if (refreshing) return;
                        refreshing = true;
                        window.location.reload();
                    });

                    // Belt-and-braces: if a worker is already waiting when we
                    // load (e.g. user backgrounded the tab across a deploy),
                    // surface the toast on next paint.
                    if (reg.waiting && navigator.serviceWorker.controller) {
                        showUpdateToast(reg.waiting);
                    }
                } catch (err) {
                    console.warn("[pwa] SW registration failed:", err);
                }
            });

            function showUpdateToast(worker) {
                const toast = document.getElementById("pwa-update-toast");
                if (!toast) return;
                toast.style.display = "flex";
                document.getElementById("pwa-update-reload").onclick = () => {
                    worker.postMessage({ type: "SKIP_WAITING" });
                    toast.style.display = "none";
                };
            }
        }
    </script>

    <!-- ─── Optional: capture the beforeinstallprompt event so the app
         can offer a custom "Install" button somewhere later. For now we
         just stash it on window so we don't lose the one-shot event. ── -->
    <script>
        window.addEventListener("beforeinstallprompt", (e) => {
            e.preventDefault();
            window.__eventwosInstallPrompt = e;
            // Broadcast to any interested UI (Dashboard install banner, etc.)
            window.dispatchEvent(new CustomEvent("pwa-installable"));
        });
        window.addEventListener("appinstalled", () => {
            window.__eventwosInstallPrompt = null;
            console.log("[pwa] app installed");
        });
    </script>
</body>
</html>
