server {
    listen $PORT;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript
               application/wasm application/octet-stream
               application/json application/manifest+json font/woff2;
    gzip_min_length 1024;
    gzip_vary on;

    # PWA manifest — proper MIME + short cache so we can update the
    # start_url / icons without waiting a week for browsers to refresh.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
    }

    # Service worker — MUST NOT be cached long-term. If sw.js is stale
    # in the browser, no new deploy ever reaches the user. Force
    # revalidation on every request; browsers additionally cap SW
    # cache lifetime at 24h regardless.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        expires off;
    }

    # Offline fallback — small, safe to cache briefly.
    location = /offline.html {
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA routing — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Blazor WASM framework assets — immutable cache (hashed filenames)
    location ~* \.(wasm|blat|dat)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(js|css|woff2|woff|ttf)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    location ~* \.(png|svg|ico|jpg|webp)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
