server {
    listen $PORT;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression: SRI-safe ────────────────────────────────────────
    # Blazor WASM ships pre-compressed .gz / .br siblings for every
    # framework asset. gzip_static tells nginx to serve those files
    # verbatim when the client sends Accept-Encoding: gzip, which
    # preserves the SRI hashes recorded in blazor.boot.json (SRI is
    # computed over the raw asset; on-the-fly re-compression changes
    # the wire bytes and breaks the browser's integrity check —
    # exactly what we saw in production as
    #   "Failed to find a valid digest in the 'integrity' attribute").
    gzip_static on;

    # Fallback on-the-fly gzip for the odd non-WASM asset that lacks
    # a .gz sibling. DELIBERATELY does not include application/wasm
    # or application/octet-stream — those are the SRI-sensitive
    # Blazor payloads. If a .wasm request slips through here without
    # a .gz sibling, we serve it raw; SRI still works.
    gzip on;
    gzip_types text/plain text/css application/javascript
               application/json application/manifest+json font/woff2;
    gzip_min_length 1024;
    gzip_vary on;

    # PWA manifest — proper MIME + short cache so we can update the
    # start_url / icons without waiting a week for browsers to refresh.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
    }

    # Service worker — MUST NOT be cached long-term. If sw.js is stale
    # in the browser, no new deploy ever reaches the user. Force
    # revalidation on every request; browsers additionally cap SW
    # cache lifetime at 24h regardless.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        expires off;
    }

    # Offline fallback — small, safe to cache briefly.
    location = /offline.html {
        add_header Cache-Control "public, max-age=3600";
    }

    # ─── Blazor WASM cache-busting: the manifest MUST NOT be cached ──
    # blazor.boot.json holds the SRI hashes for every framework asset.
    # If a browser caches the old manifest across a deploy, it computes
    # old-SRI over new-bytes and every .wasm fetch fails with
    #   "Failed to find a valid digest in the 'integrity' attribute"
    # → white screen + "An unhandled error has occurred. Reload."
    # Fix: force revalidation of the manifest AND index.html on every
    # request. The hashed .wasm/.dll/.js assets stay immutable-cached
    # because their URLs change whenever their bytes change.
    location = /_framework/blazor.boot.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # Build version stamp — same no-cache treatment. If we cached this,
    # the sidebar chip would lie about which build the user is on.
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    # Same for the root path — if a user navigates to / (the SPA entry),
    # nginx serves index.html via try_files. Adding the header to the
    # exact / route ensures the manifest chain always starts fresh.
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
        try_files /index.html =404;
    }

    # SPA routing — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Blazor WASM framework assets — immutable cache (hashed filenames)
    location ~* \.(wasm|blat|dat)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(js|css|woff2|woff|ttf)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    location ~* \.(png|svg|ico|jpg|webp)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
