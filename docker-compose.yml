version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eventwos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventwos
      POSTGRES_USER: eventwos
      POSTGRES_PASSWORD: eventwos_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventwos -d eventwos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eventwos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    container_name: eventwos_api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=eventwos;Username=eventwos;Password=eventwos_secret
      - ConnectionStrings__Redis=redis:6379,password=redis_secret,abortConnect=false
      - Jwt__Issuer=eventwos-api
      - Jwt__Audience=eventwos-client
      - Jwt__PrivateKey=${JWT_PRIVATE_KEY}
      - Jwt__PublicKey=${JWT_PUBLIC_KEY}
      - Jwt__AccessTokenExpiryMinutes=60
      - Otp__IsDevelopmentMode=false
      - AllowedOrigins__0=https://eventwos.yourdomain.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs

  # ─── Blazor Web ──────────────────────────────────────────────────────────────
  blazor:
    build:
      context: .
      dockerfile: src/BlazorWeb/Dockerfile
    container_name: eventwos_blazor
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ApiBaseUrl=http://api:8080
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  api_logs:
